name: Deploy to ECS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/tinywebapp:$IMAGE_TAG .
          docker push $ECR_REGISTRY/tinywebapp:$IMAGE_TAG
          docker tag $ECR_REGISTRY/tinywebapp:$IMAGE_TAG $ECR_REGISTRY/tinywebapp:latest
          docker push $ECR_REGISTRY/tinywebapp:latest

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster tinywebapp \
            --service tinywebapp-service \
            --force-new-deployment
